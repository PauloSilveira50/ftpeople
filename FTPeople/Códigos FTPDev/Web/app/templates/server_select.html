<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolher Servidor — FTPeople</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .server-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .server-option:hover {
      border-color: var(--accent);
      background: #f0fdf4;
    }
    .server-option input[type="radio"] {
      accent-color: var(--accent);
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .server-option input[type="radio"]:checked + .server-option-info {
      color: var(--accent);
    }
    .server-option:has(input:checked) {
      border-color: var(--accent);
      background: #f0fdf4;
    }
    .server-option-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 2px;
    }
    .server-option-host {
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
      margin: 0;
    }
  </style>
</head>
<body class="ft-auth-body">

  <a href="#" class="ft-auth-logo">
    <span class="ft-brand-badge">FT</span>
    <span class="ft-brand-name" style="color: #fff;">People</span>
  </a>

  <div class="ft-auth-card" style="max-width: 420px;">
    <h2 class="ft-auth-title">Escolha o servidor</h2>
    <p style="text-align: center; font-size: 13px; color: var(--text-muted); margin: -12px 0 20px;">
      Selecione com qual servidor deseja trabalhar
    </p>

    {% if servers %}
      <form method="POST" action="{{ url_for('server.choose_server') }}">
        {% for s in servers %}
          <label class="server-option">
            <input type="radio" name="server_id" value="{{ s.id }}"
              {% if loop.first %}checked{% endif %}>
            <div class="server-option-info">
              <p class="server-option-name">{{ s.name }}</p>
              <p class="server-option-host">{{ s.host }}:{{ s.port }}</p>
            </div>
          </label>
        {% endfor %}

        <button type="submit" class="ft-auth-btn" style="margin-top: 8px;">
          Entrar no servidor
        </button>
      </form>
    {% else %}
      <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">
        Nenhum servidor cadastrado.
      </p>
    {% endif %}

    <a href="{{ url_for('auth.logout') }}"
       style="display: block; text-align: center; margin-top: 16px; font-size: 13px; color: #64748b; text-decoration: none;">
      Sair da conta
    </a>
  </div>

</body>
</html>
